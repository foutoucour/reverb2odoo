<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Twin P</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
      width: 100%;
      max-width: 680px;
      overflow: hidden;
    }

    /* Photos */
    .photos {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111;
      max-height: 380px;
      overflow: hidden;
    }
    .photos img {
      max-height: 380px;
      max-width: 100%;
      object-fit: contain;
      display: block;
    }
    .photos-empty {
      width: 100%;
      height: 200px;
      background: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #9ca3af;
      font-size: 0.9rem;
    }

    /* Header */
    .body { padding: 28px 24px; }
    .title {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1.2;
      color: #111;
      margin-bottom: 28px;
    }

    /* Section */
    .section { margin-bottom: 24px; }
    .section-title {
      font-size: 0.72rem;
      font-weight: 700;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: .09em;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid #f0f0f0;
    }
    .specs {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
    }
    .spec {
      background: #f9fafb;
      border-radius: 8px;
      padding: 10px 14px;
    }
    .spec-label {
      font-size: 0.7rem;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .spec-value {
      font-size: 0.9rem;
      font-weight: 600;
      color: #111;
      margin-top: 3px;
    }

    /* Measurements rows */
    .measurements {
      display: flex;
      flex-direction: column;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      overflow: hidden;
    }
    .mrow {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid #f0f0f0;
    }
    .mrow:last-child { border-bottom: none; }
    .mrow:nth-child(even) { background: #fafafa; }
    .mrow-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: .05em;
      flex-shrink: 0;
      margin-right: 16px;
    }
    .mrow-value {
      font-size: 0.9rem;
      font-weight: 500;
      color: #111;
      text-align: right;
      white-space: pre-line;
    }

    /* Footer */
    .footer {
      padding: 12px 24px;
      background: #f9fafb;
      border-top: 1px solid #f0f0f0;
      font-size: 0.75rem;
      color: #c0c0c0;
      text-align: right;
    }
  </style>
</head>
